services:
  - type: web
    name: dissent-vote
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dissent-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dissent-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dissent-db
          property: password
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: dissent-db
    databaseName: dissent
    user: dissent
    plan: free
