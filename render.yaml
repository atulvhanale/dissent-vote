services:
  - type: web
    name: dissent-vote
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # Managed manually in the Render dashboard (kept out of the Blueprint so
      # syncs don't overwrite them and prompt for approval).
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: dissent-db
    databaseName: dissent
    user: dissent
    plan: free
