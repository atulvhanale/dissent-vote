services:
  - type: web
    name: dissent-vote
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dissent-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: dissent-db
    databaseName: dissent
    user: dissent
    plan: free
