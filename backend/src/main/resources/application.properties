server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/dissent
spring.datasource.username=dissent
spring.datasource.password=dissent
spring.datasource.driver-class-name=org.postgresql.Driver

# Run schema on startup; entities are seeded from members.csv by DataSeeder (real Lok Sabha data).
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# OTP validity window (minutes)
app.otp.validity-minutes=10
# Vote token validity window after OTP verification (minutes)
app.token.validity-minutes=10

# Anthropic Claude — used to summarise a free-text reason into a canonical bullet.
# Leave the key blank to disable AI: the raw reason is logged and stored as-is.
app.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.anthropic.model=claude-opus-4-8
