services:
  - type: web
    name: dissent-vote
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/dissent-vote-1.0.0.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dissent-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dissent-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dissent-db
          property: password
      - key: ANTHROPIC_API_KEY
        sync: false  # You'll set this manually in Render dashboard

databases:
  - name: dissent-db
    databaseName: dissent
    user: dissent
